<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instructions — Mock TET</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/instructions.css">
</head>
<body class="instructions-body">

  <header class="site-header">
    <div>
      <div class="site-header__logo">Mock TET</div>
    </div>
    <nav class="site-header__nav">
      <a class="header-nav-btn" href="index.html">Exams</a>
      <a class="header-nav-btn" href="revision.html">Revision</a>
      <a class="header-nav-btn" href="questionbank.html">Question Bank</a>
      <a class="header-nav-btn" href="syllabus.html">Syllabus</a>
    </nav>
  </header>

  <main class="instructions-main">

    <!-- Exam meta -->
    <div class="exam-meta-card">
      <div>
        <div class="exam-meta-card__title" id="exam-title">Loading&hellip;</div>
        <div class="exam-meta-card__body" id="exam-type"></div>
      </div>
      <div class="exam-meta-card__stats">
        <div class="stat-item"><strong id="exam-duration">—</strong>Duration</div>
        <div class="stat-item"><strong id="exam-marks">—</strong>Total Marks</div>
        <div class="stat-item"><strong id="exam-questions">—</strong>Questions</div>
      </div>
    </div>

    <!-- Error (hidden by default) -->
    <p id="error-msg" class="error-msg" style="display:none;margin-bottom:16px"></p>

    <!-- Instructions -->
    <div class="instructions-box">
      <div class="instructions-box__header">General Instructions</div>
      <div class="instructions-box__body">
        <ol class="instructions-list" id="instructions-list">
          <li>Loading instructions&hellip;</li>
        </ol>
      </div>
    </div>

    <!-- Agreement -->
    <div class="agreement-row" onclick="document.getElementById('agree-checkbox').click()">
      <input type="checkbox" id="agree-checkbox">
      <label for="agree-checkbox">
        I have read and understood all the instructions. I agree to follow the exam rules and not
        use any unfair means during the test.
      </label>
    </div>

    <!-- Mode selection -->
    <div class="mode-selection-row">
      <button class="btn btn--outline" id="btn-back-home">&#8592; Back to Home</button>
      <div class="mode-btns">
        <button class="btn btn--mode-strict" id="btn-start-strict" disabled>
          &#128274; Strict Mode
        </button>
        <button class="btn btn--mode-practice" id="btn-start-practice" disabled>
          &#128218; Practice Mode
        </button>
      </div>
    </div>

  </main>

  <script src="js/instructions.js"></script>
</body>
</html>
