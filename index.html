<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock TET — Teacher Eligibility Test Practice</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body class="home-body">

  <header class="site-header">
    <div>
      <div class="site-header__logo">Mock TET</div>
    </div>
    <nav class="site-header__nav">
      <a class="header-nav-btn active" href="index.html">Exams</a>
      <a class="header-nav-btn" href="revision.html">Revision</a>
      <a class="header-nav-btn" href="questionbank.html">Question Bank</a>
      <a class="header-nav-btn" href="syllabus.html">Syllabus</a>
    </nav>
  </header>

  <main class="home-main">

    <!-- Toolbar: clear-all only (Exams tab only) -->
    <div class="home-toolbar">
      <button class="btn btn--ghost btn--sm" id="btn-clear-all">&#128465; Clear All Results</button>
    </div>

    <!-- Filter chips -->
    <div class="exam-filters">
      <button class="filter-chip" data-filter="all">All Tests</button>
      <button class="filter-chip active" data-filter="Real Paper">Real Papers</button>
      <button class="filter-chip" data-filter="Full">Full (Mock)</button>
      <button class="filter-chip" data-filter="Telugu">Telugu</button>
      <button class="filter-chip" data-filter="Math">Math</button>
      <button class="filter-chip" data-filter="Science">Science</button>
      <button class="filter-chip" data-filter="English">English</button>
      <button class="filter-chip" data-filter="CDP">CDP</button>
    </div>

    <!-- Exam table -->
    <div id="exam-table-container" class="exam-table-container">
      <p class="loading-msg">Loading exam papers&hellip;</p>
    </div>

  </main>

  <footer class="home-footer">
    Mock TET is an unofficial practice tool. It is not affiliated with NTA, CBSE, or any government body.
  </footer>

  <script src="js/home.js"></script>
</body>
</html>
