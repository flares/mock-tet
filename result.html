<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result — Mock TET</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/result.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body class="result-body">

  <header class="site-header">
    <div>
      <div class="site-header__logo">Mock TET — Result</div>
      <div class="site-header__subtitle">Exam Scorecard &amp; Review</div>
    </div>
  </header>

  <main class="result-main" id="result-main">

    <!-- Score card -->
    <div class="score-card">
      <div>
        <div class="score-card__title" id="result-exam-title">Loading&hellip;</div>
        <div class="score-card__meta" id="result-exam-meta"></div>
      </div>
      <div class="score-card__score">
        <div class="score-card__number" id="score-number">—</div>
        <div class="score-card__total" id="score-total">out of —</div>
        <div class="score-card__percent" id="score-percent">—</div>
      </div>
    </div>

    <!-- Summary stat cards -->
    <div class="stats-row">
      <div class="stat-card stat-card--correct">
        <div class="stat-card__value" id="stat-correct">—</div>
        <div class="stat-card__label">Correct</div>
      </div>
      <div class="stat-card stat-card--incorrect">
        <div class="stat-card__value" id="stat-incorrect">—</div>
        <div class="stat-card__label">Incorrect</div>
      </div>
      <div class="stat-card stat-card--unattempted">
        <div class="stat-card__value" id="stat-unattempted">—</div>
        <div class="stat-card__label">Unattempted</div>
      </div>
      <div class="stat-card stat-card--time">
        <div class="stat-card__value" id="stat-time">—</div>
        <div class="stat-card__label">Time Taken</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="result-actions">
      <button class="btn btn--primary" id="btn-retake">&#8635; Retake Test</button>
      <button class="btn btn--outline" id="btn-home">&#8962; Back to Home</button>
    </div>

    <!-- Section breakdown -->
    <div class="section-breakdown">
      <div class="section-breakdown__header">Section-wise Performance</div>
      <table class="breakdown-table">
        <thead>
          <tr>
            <th style="text-align:left">Section</th>
            <th>Total Qs</th>
            <th>Correct</th>
            <th>Incorrect</th>
            <th>Skipped</th>
            <th>Marks</th>
          </tr>
        </thead>
        <tbody id="breakdown-body">
          <tr><td colspan="6" style="text-align:center;padding:16px;color:#888">Loading&hellip;</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Question review -->
    <div class="review-section">
      <div class="review-section__header">
        <span class="review-section__title">Question-wise Review</span>
        <div class="review-filter">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="correct">Correct</button>
          <button class="filter-btn" data-filter="incorrect">Incorrect</button>
          <button class="filter-btn" data-filter="skipped">Skipped</button>
        </div>
      </div>
      <table class="review-table">
        <thead>
          <tr>
            <th style="width:50px">#</th>
            <th>Question</th>
            <th style="width:90px;text-align:center">Your Answer</th>
            <th style="width:90px;text-align:center">Correct</th>
            <th style="width:130px;text-align:center">Explanation</th>
          </tr>
        </thead>
        <tbody id="review-body">
          <tr><td colspan="5" style="text-align:center;padding:16px;color:#888">Loading&hellip;</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <!-- ── Explanation dialog ── -->
  <dialog id="explanation-dialog" aria-labelledby="explanation-dialog-heading">
    <div class="explanation-dialog__header">
      <span class="explanation-dialog__header-title" id="explanation-dialog-heading">Explanation</span>
      <span class="explanation-dialog__conf"></span>
      <button class="explanation-dialog__close" aria-label="Close">&times;</button>
    </div>
    <div class="explanation-dialog__body"></div>
  </dialog>

  <script src="js/firebase-config.js" onerror="console.warn('Firebase config not found — AI features disabled')"></script>
  <script type="module" src="js/firebase-ai.js"></script>
  <script src="js/state.js"></script>
  <script src="js/explanation.js"></script>
  <script src="js/result.js"></script>
</body>
</html>
