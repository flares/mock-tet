<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question Bank — Mock TET</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body class="qbank-body">

  <header class="site-header">
    <div class="site-header__logo">Mock TET</div>
    <nav class="site-header__nav">
      <a class="header-nav-btn" href="index.html">Exams</a>
      <a class="header-nav-btn" href="revision.html">Revision</a>
      <a class="header-nav-btn active" href="questionbank.html">Question Bank</a>
      <a class="header-nav-btn" href="syllabus.html">Syllabus</a>
    </nav>
  </header>

  <main class="qbank-main">
    <div class="qbank-card">

      <!-- Card header -->
      <div class="qbank-card__header">

        <!-- Row 1: Progress (top-left) | Subject buttons (true centre) | spacer -->
        <div class="qbank-card__header-top">
          <div class="qbank-header-progress" id="qbank-header-progress">
            <!-- JS fills: big count + small "understood" line -->
          </div>
          <div class="qbank-subject-filters" id="qbank-subject-filters">
            <button class="qbank-subj-btn active" data-subject="all">All</button>
            <button class="qbank-subj-btn" data-subject="cdp">CDP</button>
            <button class="qbank-subj-btn" data-subject="telugu">Telugu</button>
            <button class="qbank-subj-btn" data-subject="english">English</button>
            <button class="qbank-subj-btn" data-subject="mathematics">Math</button>
            <button class="qbank-subj-btn" data-subject="science">Science</button>
          </div>
          <div class="qbank-header-spacer">
            <button class="btn--read-aloud qbank-header-read-aloud" id="qbank-read-aloud" title="Read explanation aloud">&#128266; Read Aloud</button>
          </div>
        </div>

        <!-- Row 2: Small status filters (left-aligned) -->
        <div class="exam-filters qbank-status-row" id="qbank-status-filters" style="margin-bottom:0">
          <button class="filter-chip filter-chip--sm active" data-status="yet-to-read">Yet to Read</button>
          <button class="filter-chip filter-chip--sm" data-status="all">All</button>
          <button class="filter-chip filter-chip--sm" data-status="understood">Understood</button>
          <button class="filter-chip filter-chip--sm" data-status="explained">Explained</button>
        </div>

      </div>

      <!-- Card body: 2:3 split (left=question scrollable, right=explanation scrollable) -->
      <div class="qbank-card__body">
        <div class="qbank-card__left" id="qbank-card-left">
          <p class="loading-msg">Loading question bank&hellip;</p>
        </div>
        <div class="qbank-card__right" id="qbank-card-right"></div>
      </div>

      <!-- Card footer: nav + actions -->
      <div class="qbank-card__footer">
        <button class="qbank-nav-btn" id="qbank-prev">&#8592; Prev</button>
        <div class="qbank-card__footer-center" id="qbank-footer-actions"></div>
        <button class="qbank-nav-btn" id="qbank-next">Next &#8594;</button>
      </div>

    </div>
  </main>

  <!-- Explanation dialog -->
  <dialog id="explanation-dialog" aria-labelledby="explanation-dialog-heading">
    <div class="explanation-dialog__header">
      <span class="explanation-dialog__header-title" id="explanation-dialog-heading">Explanation</span>
      <span class="explanation-dialog__conf"></span>
      <button class="explanation-dialog__close" aria-label="Close">&times;</button>
    </div>
    <div class="explanation-dialog__body"></div>
  </dialog>

  <script src="js/explanation.js"></script>
  <script src="js/questionbank.js"></script>
  <!-- Firebase AI — load config first (gitignored), then the AI module -->
  <script src="js/firebase-config.js" onerror="console.warn('Firebase config not found — AI explanations disabled. See js/firebase-config.example.js.')"></script>
  <script src="js/firebase-ai.js"></script>
</body>
</html>
