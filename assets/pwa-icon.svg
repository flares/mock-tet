<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#234d7a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>

  <!-- Stacked card shadow (third layer) -->
  <rect x="46" y="52" width="108" height="96" rx="10" fill="#ffffff" opacity="0.18"/>
  <!-- Stacked card (second layer) -->
  <rect x="42" y="48" width="108" height="96" rx="10" fill="#ffffff" opacity="0.35"/>
  <!-- Main card (top) -->
  <rect x="38" y="44" width="108" height="96" rx="10" fill="#ffffff" opacity="0.96"/>

  <!-- "TET" — large bold text on card -->
  <text x="92" y="104"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="48" font-weight="900"
        text-anchor="middle"
        fill="#1a3a5c"
        letter-spacing="2">TET</text>

  <!-- "Suite" — smaller, gold accent -->
  <text x="92" y="122"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-size="16" font-weight="700"
        text-anchor="middle"
        fill="#f0a500"
        letter-spacing="5">SUITE</text>

  <!-- Question-bank badge — bottom-right orange circle with Q -->
  <circle cx="146" cy="146" r="28" fill="#f0a500"/>
  <text x="146" y="156"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28" font-weight="700"
        text-anchor="middle"
        fill="#1a3a5c">Q</text>
</svg>
